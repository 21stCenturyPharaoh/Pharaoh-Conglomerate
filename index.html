<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Pharaoh Conglomerate</title>
  <style>
    body{background:#000;color:#FFD700;font-family:Arial;text-align:center;margin:0;padding:20px}
    h1{font-size:2.5rem;margin:20px 0}
    .video{margin:30px auto;max-width:800px}
    iframe{width:100%;height:450px;border:2px solid #FFD700}
    @media(max-width:600px){iframe{height:250px}}
  </style>
</head>
<body>
  <h1>PHARAOH CONGLOMERATE</h1>
  <div id="videos"></div>
  <script>
    fetch("./videos.json").then(r=>r.json()).then(d=>{
      document.getElementById("videos").innerHTML=d.videos.map(v=>
        `<div class="video"><h3>${v.title||"Untitled"}</h3><iframe src="https://www.youtube.com/embed/${v.id}" frameborder="0" allowfullscreen></iframe></div>`
      ).join("");
    }).catch(e=>document.getElementById("videos").innerHTML="<p>Error loading videos</p>");
  </script>
</body>
</html>
